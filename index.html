<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>英検3級 音読トレーニング</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0d0c1d 0%, #13112a 100%);
      color: #ddd9f0;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0 0 40px;
    }

    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
    }

    /* Header */
    .header {
      padding: 20px 22px 16px;
      border-bottom: 1px solid #1e1b38;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: #5c59a0;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .header-title {
      font-size: 16px;
      font-weight: 700;
      color: #e8e4ff;
    }
    input[type="date"] {
      background: #1a1730;
      border: 1px solid #2e2b50;
      border-radius: 8px;
      color: #b0acdc;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }

    /* Day info */
    .day-info {
      padding: 12px 22px 0;
    }
    .day-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .day-badge {
      background: #3a36a8;
      color: #c8c5ff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 20px;
    }
    .word-range {
      font-size: 12px;
      color: #5c59a0;
    }
    .counter {
      margin-left: auto;
      font-size: 12px;
      color: #5c5888;
    }

    /* Progress bar */
    .progress-track {
      height: 3px;
      background: #1a1730;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
      background: linear-gradient(90deg, #3a36a8, #7c77d1);
    }

    /* Main */
    .main { padding: 14px 22px 0; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 0;
      color: #4a4870;
    }
    .dots { font-size: 22px; margin-bottom: 10px; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
    .loading-text { font-size: 13px; }

    /* Error */
    .error-box {
      background: #200e0e;
      border: 1px solid #4a1a1a;
      border-radius: 12px;
      padding: 16px;
      color: #e08080;
      font-size: 13px;
      line-height: 1.7;
    }
    .error-title { font-weight: 700; margin-bottom: 8px; }
    .error-detail {
      font-size: 11px;
      color: #a06060;
      word-break: break-all;
      background: #180808;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
    }
    .retry-btn {
      background: #3a1818;
      border: 1px solid #6a2828;
      border-radius: 8px;
      color: #e08080;
      padding: 7px 18px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    /* Word card */
    .word-card {
      border-radius: 16px;
      padding: 22px 20px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      background: #14122a;
      border: 1px solid rgba(124,119,209,0.16);
    }
    .glow {
      position: absolute;
      top: -20px; right: -20px;
      width: 100px; height: 100px;
      border-radius: 50%;
      pointer-events: none;
    }
    .word-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }
    .word-num { font-size: 11px; color: #3a3860; }
    .pos-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 4px;
    }
    .word-en {
      font-size: 38px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      margin-bottom: 5px;
      line-height: 1.1;
    }
    .word-ja {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 18px;
      opacity: 0.9;
    }

    /* Example box */
    .example-box {
      background: #0e0c20;
      border-radius: 12px;
      padding: 14px 16px;
    }
    .ex-en {
      font-size: 14px;
      color: #c0bce8;
      line-height: 1.7;
      margin-bottom: 7px;
      font-weight: 500;
    }
    .ex-ja {
      font-size: 12px;
      color: #5c5888;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .speak-btn {
      border-radius: 8px;
      padding: 6px 16px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1e1b38;
      border: 1px solid #2e2b50;
      color: #7c77a8;
    }
    .speak-btn.active {
      border-color: rgba(124,119,209,0.6);
      color: #7c77d1;
      background: rgba(124,119,209,0.13);
    }

    /* Nav buttons */
    .nav { display: flex; gap: 10px; }
    .nav-prev {
      flex: 1;
      padding: 13px;
      border: 1px solid #2e2b50;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .nav-prev:not(:disabled) {
      background: #1a1730;
      color: #7c77a8;
    }
    .nav-prev:disabled {
      background: #0e0c1e;
      color: #2e2b50;
      cursor: default;
    }
    .nav-next {
      flex: 2;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }
    .nav-next.active {
      background: #3a36a8;
      color: #fff;
    }
    .nav-next.done {
      background: #1a2a1a;
      border: 1px solid #2a4a2a;
      color: #60a060;
      cursor: default;
    }

    /* Complete */
    .complete {
      text-align: center;
      padding: 48px 0;
    }
    .complete-icon { font-size: 36px; margin-bottom: 10px; }
    .complete-title { font-size: 16px; font-weight: 700; color: #8884cc; margin-bottom: 6px; }
    .complete-sub { font-size: 13px; color: #5c59a0; }

    .hidden { display: none; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="header-label">英検3級 · でる順パス単</div>
      <div class="header-title">音読トレーニング</div>
    </div>
    <input type="date" id="dateInput" value="2026-04-20" min="2026-04-20" max="2026-05-30" />
  </div>

  <!-- Day info -->
  <div class="day-info">
    <div class="day-row">
      <span class="day-badge" id="dayBadge">Day 1</span>
      <span class="word-range" id="wordRange">第1語 〜 第25語</span>
      <span class="counter hidden" id="counter">1 / 25</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">

    <div id="loadingView" class="loading">
      <div class="dots">◦ ◦ ◦</div>
      <div class="loading-text">AIが単語を生成中...</div>
    </div>

    <div id="errorView" class="error-box hidden">
      <div class="error-title">読み込みに失敗しました</div>
      <div class="error-detail" id="errorDetail"></div>
      <button class="retry-btn" onclick="retryLoad()">再試行</button>
    </div>

    <div id="cardView" class="hidden">
      <div class="word-card" id="wordCard">
        <div class="glow" id="glowEl"></div>
        <div class="word-meta">
          <span class="word-num" id="wordNum">#1</span>
          <span class="pos-badge" id="posBadge"></span>
        </div>
        <div class="word-en" id="wordEn"></div>
        <div class="word-ja" id="wordJa"></div>
        <div class="example-box">
          <div class="ex-en" id="exEn"></div>
          <div class="ex-ja" id="exJa"></div>
          <button class="speak-btn" id="speakBtn" onclick="handleSpeak()">▶ 音読する</button>
        </div>
      </div>

      <div class="nav">
        <button class="nav-prev" id="prevBtn" onclick="goTo(currentIdx - 1)" disabled>← 前へ</button>
        <button class="nav-next active" id="nextBtn" onclick="goNext()">次の単語 →</button>
      </div>
    </div>

    <div id="completeView" class="complete hidden">
      <div class="complete-icon">🎉</div>
      <div class="complete-title">1200語 完全制覇！</div>
      <div class="complete-sub">全単語を学習しました！</div>
    </div>

  </div>
</div>

<script>
  const START = new Date("2026-04-20T00:00:00");
  const PER_DAY = 25;
  const MAX = 1200;

  const POS_COLORS = {
    "名詞": "#5b8dee",
    "動詞": "#50c878",
    "形容詞": "#f5a623",
    "副詞": "#c97bf5",
    "前置詞": "#f07878",
    "接続詞": "#78d4f0",
  };

  let words = [];
  let currentIdx = 0;
  let currentStartNum = 1;

  function dateToDay(str) {
    const d = new Date(str + "T00:00:00");
    return Math.max(1, Math.floor((d - START) / 86400000) + 1);
  }

  function updateHeader(day, startNum) {
    document.getElementById("dayBadge").textContent = "Day " + day;
    const end = Math.min(startNum + PER_DAY - 1, MAX);
    document.getElementById("wordRange").textContent = "第" + startNum + "語 〜 第" + end + "語";
  }

  function showView(name) {
    ["loadingView","errorView","cardView","completeView"].forEach(id => {
      document.getElementById(id).classList.add("hidden");
    });
    document.getElementById(name).classList.remove("hidden");
  }

  function renderCard(idx) {
    const w = words[idx];
    if (!w) return;
    const accent = POS_COLORS[w.pos] || "#7c77d1";

    document.getElementById("glowEl").style.background =
      "radial-gradient(circle, " + accent + "18 0%, transparent 70%)";
    document.getElementById("wordCard").style.borderColor = accent + "28";
    document.getElementById("wordNum").textContent = "#" + w.n;

    const pb = document.getElementById("posBadge");
    pb.textContent = w.pos;
    pb.style.background = accent + "22";
    pb.style.color = accent;

    document.getElementById("wordEn").textContent = w.word;
    document.getElementById("wordJa").style.color = accent;
    document.getElementById("wordJa").textContent = w.meaning;
    document.getElementById("exEn").textContent = w.ex_en;
    document.getElementById("exJa").textContent = w.ex_ja;

    // Progress
    const pct = ((idx + 1) / words.length) * 100;
    document.getElementById("progressFill").style.width = pct + "%";
    document.getElementById("progressFill").style.background =
      "linear-gradient(90deg, #3a36a8, " + accent + ")";
    document.getElementById("counter").textContent = (idx + 1) + " / " + words.length;
    document.getElementById("counter").classList.remove("hidden");

    // Buttons
    document.getElementById("prevBtn").disabled = (idx === 0);
    const nb = document.getElementById("nextBtn");
    if (idx === words.length - 1) {
      nb.textContent = "✓ 今日の25語 完了！";
      nb.className = "nav-next done";
    } else {
      nb.textContent = "次の単語 →";
      nb.className = "nav-next active";
    }

    // Reset speak btn
    const sb = document.getElementById("speakBtn");
    sb.textContent = "▶ 音読する";
    sb.className = "speak-btn";
  }

  function goTo(idx) {
    if (idx < 0 || idx >= words.length) return;
    currentIdx = idx;
    renderCard(currentIdx);
  }

  function goNext() {
    if (currentIdx < words.length - 1) goTo(currentIdx + 1);
  }

  function handleSpeak() {
    if (!words[currentIdx]) return;
    const btn = document.getElementById("speakBtn");
    btn.textContent = "♪ 読み上げ中...";
    btn.className = "speak-btn active";
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(words[currentIdx].ex_en);
    utt.lang = "en-US";
    utt.rate = 0.8;
    utt.onend = () => {
      btn.textContent = "▶ 音読する";
      btn.className = "speak-btn";
    };
    speechSynthesis.speak(utt);
  }

  async function loadWords(startNum) {
    currentStartNum = startNum;
    currentIdx = 0;
    document.getElementById("counter").classList.add("hidden");
    document.getElementById("progressFill").style.width = "0%";
    showView("loadingView");

    // Check localStorage cache
    const cacheKey = "eiken3_" + startNum;
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      try {
        words = JSON.parse(cached);
        showView("cardView");
        renderCard(0);
        return;
      } catch(e) {}
    }

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4000,
          system: `英検3級の単語を頻度順に提供します。JSONのみ返すこと。コードブロック記号不要。
形式: {"words":[{"n":番号,"word":"英単語","pos":"品詞","meaning":"日本語訳","ex_en":"短い例文","ex_ja":"例文訳"},...]}
posは名詞/動詞/形容詞/副詞のいずれか。ex_enは15語以内のシンプルな文。`,
          messages: [{
            role: "user",
            content: `英検3級 でる順 第${startNum}語〜第${startNum + PER_DAY - 1}語を返してください。`
          }]
        })
      });

      if (!res.ok) {
        const t = await res.text();
        throw new Error("API " + res.status + ": " + t.slice(0, 200));
      }

      const data = await res.json();
      if (!data.content || !data.content.length) {
        throw new Error("レスポンスが空: " + JSON.stringify(data).slice(0,200));
      }

      const text = data.content
        .filter(b => b.type === "text")
        .map(b => b.text)
        .join("");
      const clean = text.replace(/```json|```/g, "").trim();

      let parsed;
      try { parsed = JSON.parse(clean); }
      catch(e) { throw new Error("JSON解析失敗: " + clean.slice(0,200)); }

      if (!parsed.words || !Array.isArray(parsed.words)) {
        throw new Error("wordsなし: " + JSON.stringify(parsed).slice(0,200));
      }

      words = parsed.words;
      localStorage.setItem(cacheKey, JSON.stringify(words));
      showView("cardView");
      renderCard(0);

    } catch(e) {
      document.getElementById("errorDetail").textContent = e.message;
      showView("errorView");
    }
  }

  function retryLoad() { loadWords(currentStartNum); }

  document.getElementById("dateInput").addEventListener("change", function() {
    const day = dateToDay(this.value);
    const startNum = (day - 1) * PER_DAY + 1;
    updateHeader(day, startNum);
    if (startNum > MAX) {
      showView("completeView");
    } else {
      loadWords(startNum);
    }
  });

  // Init
  (function() {
    const day = dateToDay("2026-04-20");
    const startNum = 1;
    updateHeader(day, startNum);
    loadWords(startNum);
  })();
</script>
</body>
</html>
