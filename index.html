<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>英検3級 音読トレーニング</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:linear-gradient(160deg,#0d0c1d 0%,#13112a 100%);color:#ddd9f0;font-family:-apple-system,'Helvetica Neue',sans-serif;display:flex;justify-content:center}
    .app{width:100%;max-width:480px;min-height:100vh;padding-bottom:40px}
    .header{padding:20px 22px 16px;border-bottom:1px solid #1e1b38;display:flex;align-items:center;justify-content:space-between}
    .header-label{font-size:10px;letter-spacing:.18em;color:#5c59a0;text-transform:uppercase;margin-bottom:3px}
    .header-title{font-size:16px;font-weight:700;color:#e8e4ff}
    input[type="date"]{background:#1a1730;border:1px solid #2e2b50;border-radius:8px;color:#b0acdc;padding:7px 10px;font-size:13px;outline:none;font-family:inherit}
    .day-info{padding:12px 22px 0}
    .day-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .day-badge{background:#3a36a8;color:#c8c5ff;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px}
    .word-range{font-size:12px;color:#5c59a0}
    .counter{margin-left:auto;font-size:12px;color:#5c5888}
    .progress-track{height:3px;background:#1a1730;border-radius:2px;overflow:hidden}
    .progress-fill{height:100%;border-radius:2px;transition:width .4s ease}
    .main{padding:14px 22px 0}

    /* Word card */
    .word-card{border-radius:16px;padding:22px 20px;margin-bottom:12px;position:relative;overflow:hidden;background:#14122a;border:1px solid rgba(124,119,209,.16)}
    .glow{position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;pointer-events:none}
    .word-meta{display:flex;gap:8px;align-items:center;margin-bottom:12px}
    .word-num{font-size:11px;color:#3a3860}
    .pos-badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:4px}
    .word-en{font-size:38px;font-weight:800;color:#fff;letter-spacing:-1px;margin-bottom:5px;line-height:1.1}
    .word-ja{font-size:20px;font-weight:500;margin-bottom:18px;opacity:.9}
    .example-box{background:#0e0c20;border-radius:12px;padding:14px 16px}
    .ex-en{font-size:14px;color:#c0bce8;line-height:1.7;margin-bottom:7px;font-weight:500}
    .ex-ja{font-size:12px;color:#5c5888;line-height:1.6;margin-bottom:12px}
    .speak-btn{border-radius:8px;padding:6px 16px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:6px;background:#1e1b38;border:1px solid #2e2b50;color:#7c77a8}
    .speak-btn.active{border-color:rgba(124,119,209,.6);color:#7c77d1;background:rgba(124,119,209,.13)}

    /* Conjugation card */
    .conj-card{border-radius:16px;padding:22px 20px;margin-bottom:12px;background:#0f1a14;border:1px solid rgba(80,200,120,.2);position:relative;overflow:hidden}
    .conj-header{display:flex;gap:8px;align-items:center;margin-bottom:18px}
    .conj-label{font-size:10px;letter-spacing:.15em;color:#3a8a56;text-transform:uppercase;font-weight:600}
    .conj-auto{font-size:10px;color:#2a6a40;background:#0a2010;border:1px solid #1a4a28;border-radius:4px;padding:2px 8px}
    .conj-rows{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
    .conj-row{display:flex;align-items:center;gap:14px;background:#0a1a10;border-radius:10px;padding:12px 16px}
    .conj-role{font-size:10px;color:#3a6a46;width:52px;flex-shrink:0;letter-spacing:.05em}
    .conj-form{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.5px;flex:1}
    .conj-form.same{color:#5a7a62;font-size:22px}
    .conj-play{border-radius:8px;padding:8px 20px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s;background:#1a3a22;border:1px solid #2a5a32;color:#60c070;font-weight:600;display:flex;align-items:center;gap:8px;width:100%;justify-content:center}
    .conj-play.playing{background:rgba(80,200,120,.15);border-color:rgba(80,200,120,.5);color:#80e090}

    /* Nav */
    .nav{display:flex;gap:10px}
    .nav-prev{flex:1;padding:13px;border:1px solid #2e2b50;border-radius:12px;font-size:14px;font-family:inherit;font-weight:500;cursor:pointer}
    .nav-prev:not(:disabled){background:#1a1730;color:#7c77a8}
    .nav-prev:disabled{background:#0e0c1e;color:#2e2b50;cursor:default}
    .nav-next{flex:2;padding:13px;border-radius:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
    .nav-next.active{background:#3a36a8;color:#fff;border:none}
    .nav-next.conj-step{background:#1a3a22;color:#60c070;border:1px solid #2a5a32}
    .nav-next.done{background:#1a2a1a;border:1px solid #2a4a2a;color:#60a060;cursor:default}

    /* Complete / No data */
    .complete,.no-data{text-align:center;padding:48px 20px}
    .complete-icon,.no-data-icon{font-size:36px;margin-bottom:10px}
    .complete-title,.no-data-title{font-size:16px;font-weight:700;color:#8884cc;margin-bottom:6px}
    .complete-sub,.no-data-sub{font-size:12px;color:#5c59a0;line-height:1.8}
    .hidden{display:none}
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-label">英検3級 · でる順パス単</div>
      <div class="header-title">音読トレーニング</div>
    </div>
    <input type="date" id="dateInput" value="2026-04-20" min="2026-04-20" max="2026-05-30"/>
  </div>
  <div class="day-info">
    <div class="day-row">
      <span class="day-badge" id="dayBadge">Day 1</span>
      <span class="word-range" id="wordRange">第1語 〜 第25語</span>
      <span class="counter hidden" id="counter"></span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
  <div class="main">

    <!-- Word card -->
    <div id="wordCardView" class="hidden">
      <div class="word-card" id="wordCard">
        <div class="glow" id="glowEl"></div>
        <div class="word-meta">
          <span class="word-num" id="wordNum"></span>
          <span class="pos-badge" id="posBadge"></span>
        </div>
        <div class="word-en" id="wordEn"></div>
        <div class="word-ja" id="wordJa"></div>
        <div class="example-box">
          <div class="ex-en" id="exEn"></div>
          <div class="ex-ja" id="exJa"></div>
          <button class="speak-btn" id="speakBtn" onclick="speakExample()">▶ 例文を音読</button>
        </div>
      </div>
      <div class="nav">
        <button class="nav-prev" id="prevBtn" onclick="goPrev()" disabled>← 前へ</button>
        <button class="nav-next active" id="nextBtn" onclick="goNext()">次へ →</button>
      </div>
    </div>

    <!-- Conjugation card -->
    <div id="conjCardView" class="hidden">
      <div class="conj-card">
        <div class="conj-header">
          <span class="conj-label">動詞の活用形</span>
          <span class="conj-auto" id="autoLabel">自動再生</span>
        </div>
        <div class="conj-rows" id="conjRows"></div>
        <button class="conj-play" id="conjPlayBtn" onclick="playConj()">▶ もう一度聞く</button>
      </div>
      <div class="nav">
        <button class="nav-prev" onclick="backToWord()">← 単語に戻る</button>
        <button class="nav-next active" id="conjNextBtn" onclick="goNextWord()">次の単語 →</button>
      </div>
    </div>

    <div id="noDataView" class="no-data hidden">
      <div class="no-data-icon">📚</div>
      <div class="no-data-title">この日のデータはまだ準備中</div>
      <div class="no-data-sub">現在はDay 1〜10（第1〜250語）が収録されています。</div>
    </div>
    <div id="completeView" class="complete hidden">
      <div class="complete-icon">🎉</div>
      <div class="complete-title">全語数 完全制覇！</div>
      <div class="complete-sub">お疲れ様！全部の単語を学習しました。</div>
    </div>
  </div>
</div>

const START = new Date("2026-04-20T00:00:00");
const PER_DAY = 25, MAX = 1200;
const POS_COLORS = {"動詞":"#50c878","名詞":"#5b8dee","形容詞":"#f5a623","副詞":"#c97bf5","前置詞":"#f07878","接続詞":"#78d4f0"};
const CONJ_LABELS = ["原形","過去形","過去分詞"];

let dayWords=[], wordIdx=0;

function dateToDay(s){const d=new Date(s+"T00:00:00");return Math.max(1,Math.floor((d-START)/86400000)+1)}
function show(id){["wordCardView","conjCardView","noDataView","completeView"].forEach(i=>document.getElementById(i).classList.add("hidden"));document.getElementById(id).classList.remove("hidden")}

function updateProgress(){
  const total=dayWords.length;
  const pct=((wordIdx+1)/total)*100;
  const w=dayWords[wordIdx];
  const accent=POS_COLORS[w.pos]||"#7c77d1";
  document.getElementById("progressFill").style.cssText=`width:${pct}%;background:linear-gradient(90deg,#3a36a8,${accent})`;
  const ct=document.getElementById("counter");
  ct.textContent=(wordIdx+1)+" / "+total;
  ct.classList.remove("hidden");
}

function renderWordCard(){
  const w=dayWords[wordIdx];
  const accent=POS_COLORS[w.pos]||"#7c77d1";
  document.getElementById("glowEl").style.background=`radial-gradient(circle,${accent}18 0%,transparent 70%)`;
  document.getElementById("wordCard").style.borderColor=accent+"28";
  document.getElementById("wordNum").textContent="#"+w.n;
  const pb=document.getElementById("posBadge");
  pb.textContent=w.pos;pb.style.background=accent+"22";pb.style.color=accent;
  document.getElementById("wordEn").textContent=w.word;
  const wj=document.getElementById("wordJa");wj.style.color=accent;wj.textContent=w.meaning;
  document.getElementById("exEn").textContent=w.ex_en;
  document.getElementById("exJa").textContent=w.ex_ja;
  const sb=document.getElementById("speakBtn");sb.textContent="▶ 例文を音読";sb.className="speak-btn";
  // Prev button
  document.getElementById("prevBtn").disabled=(wordIdx===0);
  // Next button label
  const nb=document.getElementById("nextBtn");
  const hasConj=w.conj&&w.conj.length>0;
  if(hasConj){nb.textContent="活用形を見る →";nb.className="nav-next conj-step";}
  else if(wordIdx===dayWords.length-1){nb.textContent="✓ 今日の25語 完了！";nb.className="nav-next done";}
  else{nb.textContent="次の単語 →";nb.className="nav-next active";}
  updateProgress();
  show("wordCardView");
}

function renderConjCard(){
  const w=dayWords[wordIdx];
  const forms=w.conj.split("|");
  const rows=document.getElementById("conjRows");
  rows.innerHTML="";
  forms.forEach((form,i)=>{
    const isSame=i>0&&form===forms[0];
    const div=document.createElement("div");
    div.className="conj-row";
    div.innerHTML=`<span class="conj-role">${CONJ_LABELS[i]}</span><span class="conj-form${isSame?" same":""}">${form}</span>`;
    rows.appendChild(div);
  });
  // Next button
  const nb=document.getElementById("conjNextBtn");
  if(wordIdx===dayWords.length-1){nb.textContent="✓ 今日の25語 完了！";nb.className="nav-next done";}
  else{nb.textContent="次の単語 →";nb.className="nav-next active";}
  show("conjCardView");
  // Auto-play
  setTimeout(()=>playConj(),400);
}

function playConj(){
  const w=dayWords[wordIdx];
  if(!w.conj)return;
  const forms=w.conj.split("|");
  const btn=document.getElementById("conjPlayBtn");
  btn.textContent="♪ 再生中...";btn.className="conj-play playing";
  speechSynthesis.cancel();
  let i=0;
  function speakNext(){
    if(i>=forms.length){btn.textContent="▶ もう一度聞く";btn.className="conj-play";return;}
    const utt=new SpeechSynthesisUtterance(forms[i]);
    utt.lang="en-US";utt.rate=0.75;utt.pitch=1;
    utt.onend=()=>{i++;setTimeout(speakNext,400);};
    speechSynthesis.speak(utt);
  }
  speakNext();
}

function speakExample(){
  const w=dayWords[wordIdx];
  const btn=document.getElementById("speakBtn");
  btn.textContent="♪ 読み上げ中...";btn.className="speak-btn active";
  speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(w.ex_en);
  utt.lang="en-US";utt.rate=0.8;
  utt.onend=()=>{btn.textContent="▶ 例文を音読";btn.className="speak-btn";};
  speechSynthesis.speak(utt);
}

function goNext(){
  const w=dayWords[wordIdx];
  const hasConj=w.conj&&w.conj.length>0;
  if(hasConj){renderConjCard();}
  else{goNextWord();}
}

function goNextWord(){
  if(wordIdx<dayWords.length-1){wordIdx++;renderWordCard();}
}

function goPrev(){
  if(wordIdx>0){wordIdx--;renderWordCard();}
}

function backToWord(){renderWordCard();}

function loadDay(dateStr){
  const day=dateToDay(dateStr);
  const s=(day-1)*PER_DAY+1,e=s+PER_DAY-1;
  document.getElementById("dayBadge").textContent="Day "+day;
  document.getElementById("wordRange").textContent="第"+s+"語 〜 第"+Math.min(e,MAX)+"語";
  document.getElementById("counter").classList.add("hidden");
  document.getElementById("progressFill").style.width="0%";
  wordIdx=0;
  if(s>MAX){show("completeView");return;}
  dayWords=ALL_WORDS.filter(w=>w.n>=s&&w.n<=e);
  if(!dayWords.length){show("noDataView");return;}
  renderWordCard();
}

document.getElementById("dateInput").addEventListener("change",e=>loadDay(e.target.value));
loadDay("2026-04-20");
</script>
