<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>英検3級 音読トレーニング</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0d0c1d 0%, #13112a 100%);
      color: #ddd9f0;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
    }
    .app { width: 100%; max-width: 480px; min-height: 100vh; padding-bottom: 40px; }
    .header {
      padding: 20px 22px 16px;
      border-bottom: 1px solid #1e1b38;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-label { font-size: 10px; letter-spacing: 0.18em; color: #5c59a0; text-transform: uppercase; margin-bottom: 3px; }
    .header-title { font-size: 16px; font-weight: 700; color: #e8e4ff; }
    input[type="date"] {
      background: #1a1730; border: 1px solid #2e2b50; border-radius: 8px;
      color: #b0acdc; padding: 7px 10px; font-size: 13px; outline: none; font-family: inherit;
    }
    .day-info { padding: 12px 22px 0; }
    .day-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .day-badge { background: #3a36a8; color: #c8c5ff; font-size: 11px; font-weight: 700; padding: 3px 12px; border-radius: 20px; }
    .word-range { font-size: 12px; color: #5c59a0; }
    .counter { margin-left: auto; font-size: 12px; color: #5c5888; }
    .progress-track { height: 3px; background: #1a1730; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .main { padding: 14px 22px 0; }
    .word-card {
      border-radius: 16px; padding: 22px 20px; margin-bottom: 12px;
      position: relative; overflow: hidden;
      background: #14122a; border: 1px solid rgba(124,119,209,0.16);
    }
    .glow {
      position: absolute; top: -20px; right: -20px;
      width: 100px; height: 100px; border-radius: 50%; pointer-events: none;
    }
    .word-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .word-num { font-size: 11px; color: #3a3860; }
    .pos-badge { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 4px; }
    .word-en { font-size: 38px; font-weight: 800; color: #fff; letter-spacing: -1px; margin-bottom: 5px; line-height: 1.1; }
    .word-ja { font-size: 20px; font-weight: 500; margin-bottom: 18px; opacity: 0.9; }
    .example-box { background: #0e0c20; border-radius: 12px; padding: 14px 16px; }
    .ex-en { font-size: 14px; color: #c0bce8; line-height: 1.7; margin-bottom: 7px; font-weight: 500; }
    .ex-ja { font-size: 12px; color: #5c5888; line-height: 1.6; margin-bottom: 12px; }
    .speak-btn {
      border-radius: 8px; padding: 6px 16px; font-size: 12px; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 6px;
      background: #1e1b38; border: 1px solid #2e2b50; color: #7c77a8;
    }
    .speak-btn.active { border-color: rgba(124,119,209,0.6); color: #7c77d1; background: rgba(124,119,209,0.13); }
    .nav { display: flex; gap: 10px; }
    .nav-prev {
      flex: 1; padding: 13px; border: 1px solid #2e2b50; border-radius: 12px;
      font-size: 14px; font-family: inherit; font-weight: 500; cursor: pointer; transition: all 0.15s;
    }
    .nav-prev:not(:disabled) { background: #1a1730; color: #7c77a8; }
    .nav-prev:disabled { background: #0e0c1e; color: #2e2b50; cursor: default; }
    .nav-next {
      flex: 2; padding: 13px; border-radius: 12px;
      font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.15s;
    }
    .nav-next.active { background: #3a36a8; color: #fff; border: none; }
    .nav-next.done { background: #1a2a1a; border: 1px solid #2a4a2a; color: #60a060; cursor: default; }
    .complete { text-align: center; padding: 48px 0; }
    .complete-icon { font-size: 36px; margin-bottom: 10px; }
    .complete-title { font-size: 16px; font-weight: 700; color: #8884cc; margin-bottom: 6px; }
    .complete-sub { font-size: 13px; color: #5c59a0; }
    .hidden { display: none; }
    .no-data {
      text-align: center; padding: 48px 20px; color: #5c59a0;
      background: #14122a; border-radius: 16px; border: 1px solid #2e2b50;
    }
    .no-data-title { font-size: 15px; font-weight: 600; color: #8884cc; margin-bottom: 8px; }
    .no-data-sub { font-size: 12px; line-height: 1.8; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-label">英検3級 · でる順パス単</div>
      <div class="header-title">音読トレーニング</div>
    </div>
    <input type="date" id="dateInput" value="2026-04-20" min="2026-04-20" max="2026-05-30" />
  </div>
  <div class="day-info">
    <div class="day-row">
      <span class="day-badge" id="dayBadge">Day 1</span>
      <span class="word-range" id="wordRange">第1語 〜 第25語</span>
      <span class="counter hidden" id="counter"></span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
  <div class="main">
    <div id="cardView" class="hidden">
      <div class="word-card" id="wordCard">
        <div class="glow" id="glowEl"></div>
        <div class="word-meta">
          <span class="word-num" id="wordNum"></span>
          <span class="pos-badge" id="posBadge"></span>
        </div>
        <div class="word-en" id="wordEn"></div>
        <div class="word-ja" id="wordJa"></div>
        <div class="example-box">
          <div class="ex-en" id="exEn"></div>
          <div class="ex-ja" id="exJa"></div>
          <button class="speak-btn" id="speakBtn" onclick="handleSpeak()">▶ 音読する</button>
        </div>
      </div>
      <div class="nav">
        <button class="nav-prev" id="prevBtn" onclick="goTo(currentIdx-1)" disabled>← 前へ</button>
        <button class="nav-next active" id="nextBtn" onclick="goNext()">次の単語 →</button>
      </div>
    </div>
    <div id="noDataView" class="no-data hidden">
      <div class="no-data-title">この日のデータはまだ準備中</div>
      <div class="no-data-sub">現在は第1語〜第250語（Day 1〜10）が収録されています。<br>随時追加予定です。</div>
    </div>
    <div id="completeView" class="complete hidden">
      <div class="complete-icon">🎉</div>
      <div class="complete-title">全語数 完全制覇！</div>
      <div class="complete-sub">お疲れ様！全部の単語を学習しました。</div>
    </div>
  </div>
</div>

    document.getElementById(id).classList.add("hidden")
  );
  document.getElementById(name).classList.remove("hidden");
}

function renderCard(idx) {
  const w = dayWords[idx];
  const accent = POS_COLORS[w.pos] || "#7c77d1";
  document.getElementById("glowEl").style.background = `radial-gradient(circle, ${accent}18 0%, transparent 70%)`;
  document.getElementById("wordCard").style.borderColor = accent + "28";
  document.getElementById("wordNum").textContent = "#" + w.n;
  const pb = document.getElementById("posBadge");
  pb.textContent = w.pos; pb.style.background = accent + "22"; pb.style.color = accent;
  document.getElementById("wordEn").textContent = w.word;
  const wj = document.getElementById("wordJa");
  wj.style.color = accent; wj.textContent = w.meaning;
  document.getElementById("exEn").textContent = w.ex_en;
  document.getElementById("exJa").textContent = w.ex_ja;
  const pct = ((idx + 1) / dayWords.length) * 100;
  const pf = document.getElementById("progressFill");
  pf.style.width = pct + "%";
  pf.style.background = `linear-gradient(90deg, #3a36a8, ${accent})`;
  const ct = document.getElementById("counter");
  ct.textContent = (idx+1) + " / " + dayWords.length;
  ct.classList.remove("hidden");
  document.getElementById("prevBtn").disabled = (idx === 0);
  const nb = document.getElementById("nextBtn");
  if (idx === dayWords.length - 1) { nb.textContent = "✓ 今日の25語 完了！"; nb.className = "nav-next done"; }
  else { nb.textContent = "次の単語 →"; nb.className = "nav-next active"; }
  const sb = document.getElementById("speakBtn");
  sb.textContent = "▶ 音読する"; sb.className = "speak-btn";
}

function goTo(idx) {
  if (idx < 0 || idx >= dayWords.length) return;
  currentIdx = idx; renderCard(currentIdx);
}
function goNext() { if (currentIdx < dayWords.length - 1) goTo(currentIdx + 1); }

function handleSpeak() {
  if (!dayWords[currentIdx]) return;
  const btn = document.getElementById("speakBtn");
  btn.textContent = "♪ 読み上げ中..."; btn.className = "speak-btn active";
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(dayWords[currentIdx].ex_en);
  utt.lang = "en-US"; utt.rate = 0.8;
  utt.onend = () => { btn.textContent = "▶ 音読する"; btn.className = "speak-btn"; };
  speechSynthesis.speak(utt);
}

function loadDay(dateStr) {
  const day = dateToDay(dateStr);
  const startNum = (day - 1) * PER_DAY + 1;
  const endNum = startNum + PER_DAY - 1;
  document.getElementById("dayBadge").textContent = "Day " + day;
  document.getElementById("wordRange").textContent = "第" + startNum + "語 〜 第" + Math.min(endNum, MAX) + "語";
  document.getElementById("counter").classList.add("hidden");
  document.getElementById("progressFill").style.width = "0%";
  currentIdx = 0;
  if (startNum > MAX) { showView("completeView"); return; }
  dayWords = ALL_WORDS.filter(w => w.n >= startNum && w.n <= endNum);
  if (dayWords.length === 0) { showView("noDataView"); return; }
  showView("cardView"); renderCard(0);
}

document.getElementById("dateInput").addEventListener("change", e => loadDay(e.target.value));
loadDay("2026-04-20");
</script>
